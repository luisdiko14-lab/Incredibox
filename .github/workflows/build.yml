name: Build & Upload Artifact

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🧾 Show files (debug)
        run: ls -la

      - name: 📦 Create ZIP of project
        run: |
          zip -r project-build.zip . -x "*.git*" "node_modules/*" ".github/*"

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-build
          path: project-build.zip

      - name: 🔗 Print download instructions
        run: |
          echo "Go to Actions tab → This workflow run → Artifacts → Download project-build"
